title: Research Proposals
description: Small research problems open for collaboration
theme: jekyll-theme-cayman

# Required for a PROJECT Pages site served at https://USERNAME.github.io/research-proposals/
# so the theme's CSS/asset links resolve. If you name the repo something other than
# "research-proposals", change this to "/<your-repo-name>".
baseurl: "/research-proposals"

# Keep LaTeX sources in the repo for the record, but don't publish them to the site.
exclude:
  - "*.tex"
  - "*.bib"
  - "*.aux"
  - "*.bbl"
  - "*.bcf"
  - "*.blg"
  - "*.log"
  - "*.out"
  - "*.run.xml"
  - "*.synctex.gz"
  - "*.fdb_latexmk"
  - "*.fls"
  - README.md
